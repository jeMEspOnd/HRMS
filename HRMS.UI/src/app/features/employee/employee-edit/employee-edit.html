<section class="edit-page">
  <div class="page-header">
    <div>
      <p class="eyebrow">Employees</p>
      <h2>Edit employee</h2>
      <p class="subtitle">Update employee profile, role, department, and status.</p>
    </div>
    <a routerLink="/employees">Back to Directory</a>
  </div>

  <form class="edit-card" [formGroup]="employeeForm" (ngSubmit)="submit()" novalidate>
    <div class="profile-summary">
      <span class="avatar">RM</span>
      <div>
        <h3>Rahul Mehta</h3>
        <p>EMP-1002 • Engineering</p>
      </div>
    </div>

    <div class="form-grid">
      <label><span>Full name</span><input formControlName="name" /></label>
      <label><span>Email</span><input type="email" formControlName="email" /></label>
      <label><span>Phone</span><input formControlName="phone" /></label>
      <label>
        <span>Department</span>
        <select formControlName="department">
          <option>Engineering</option>
          <option>Human Resources</option>
          <option>Finance</option>
          <option>Operations</option>
          <option>Sales</option>
        </select>
      </label>
      <label><span>Designation</span><input formControlName="designation" /></label>
      <label>
        <span>Status</span>
        <select formControlName="status">
          <option>Active</option>
          <option>On Leave</option>
          <option>Probation</option>
          <option>Inactive</option>
        </select>
      </label>
      <label><span>Location</span><input formControlName="location" /></label>
      <label><span>Manager</span><input formControlName="manager" /></label>
    </div>

    <div class="form-actions">
      <a routerLink="/employees">Cancel</a>
      <button type="submit">Update Employee</button>
    </div>
  </form>
</section>
